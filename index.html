<!DOCTYPE html>
<html>
<head>
  <title>Bonsai Teja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eef2ef;
    }

    .hero {
      background: url('images (1).jpeg') center/cover;
      color: white;
      padding: 80px 20px;
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.5);
    }

    .hero h1, .hero p {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 32px;
      margin: 0;
    }

    .hero p {
      font-size: 14px;
      margin-top: 10px;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: 0.25s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .content {
      padding: 12px;
    }

    .badge {
      background: #e6f4ea;
      color: #28a745;
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      margin-bottom: 5px;
    }

    .product h3 {
      margin: 5px 0;
      font-size: 15px;
    }

    .price {
      font-weight: bold;
      margin: 5px 0;
    }

    .btn {
      display: block;
      background: #28a745;
      color: white;
      padding: 10px;
      text-align: center;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .wa {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25d366;
      color: white;
      padding: 14px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

  </style>
</head>

<body>

<div class="hero">
  <h1>Bonsai Teja</h1>
  <p>Bonsai unik & estetik untuk dekorasi rumah</p>
</div>

<div class="products">

  <div class="product">
    <img src="images (1).jpeg">
    <div class="content">
      <span class="badge">Ready Stock</span>
      <h3>Bonsai Beringin Mini</h3>
      <p class="price">Rp 75.000</p>
      <a class="btn" href="#">Beli Sekarang</a>
    </div>
  </div>

  <div class="product">
    <img src="79b71-evt_japanesefestival_jjmueller_8593.jpg">
    <div class="content">
      <span class="badge">Best Seller</span>
      <h3>Bonsai Serut</h3>
      <p class="price">Rp 120.000</p>
      <a class="btn" href="#">Beli Sekarang</a>
    </div>
  </div>

</div>

<a href="https://wa.me/6285722040811" class="wa">
  Chat WhatsApp
</a>

</body>
  </html>
