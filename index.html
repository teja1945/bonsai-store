<!DOCTYPE html>
<html>
<head>
  <title>Bonsai Teja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    .hero {
      background: #2e4d34;
      color: white;
      padding: 40px;
      text-align: center;
    }
    .product {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    .btn {
      display: block;
      background: green;
      color: white;
      padding: 10px;
      text-align: center;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Bonsai Teja</h1>
  <p>Bonsai Siap Bentuk & Siap Rawat</p>
</div>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Bonsai Beringin Mini</h3>
  <p>Rp 75.000</p>
  <a class="btn" href="#">Beli Sekarang</a>
</div>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Bonsai Serut</h3>
  <p>Rp 120.000</p>
  <a class="btn" href="#">Beli Sekarang</a>
</div>

</body>
</html>
