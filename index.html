<!DOCTYPE html>
<html>
<head>
  <title>Bonsai Teja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f6f5;
    }

    /* HERO */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('images (1).jpeg') center/cover;
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 700;
    }

    .hero p {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .product {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.25s;
    }

    .product:hover {
      transform: translateY(-6px);
    }

    .product img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .content {
      padding: 14px;
    }

    .badge {
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 6px;
    }

    .product h3 {
      margin: 5px 0;
      font-size: 15px;
      font-weight: 500;
    }

    .price {
      font-weight: 700;
      margin: 6px 0;
      color: #222;
    }

    .btn {
      display: block;
      background: #2e7d32;
      color: white;
      padding: 10px;
      text-align: center;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    /* WA BUTTON */
    .wa {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25d366;
      color: white;
      padding: 14px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

  </style>
</head>

<body>

<div class="hero">
  <h1>Bonsai Teja</h1>
  <p>Bonsai estetik untuk dekorasi rumah & meja kerja</p>
</div>

<div class="products">

  <div class="product">
    <img src="images (1).jpeg">
    <div class="content">
      <span class="badge">Ready Stock</span>
      <h3>Bonsai Beringin Mini</h3>
      <p class="price">Rp 75.000</p>
      <a class="btn" href="https://shopee.co.id/produk-kamu">Beli Sekarang</a>
    </div>
  </div>

  <div class="product">
    <img src="79b71-evt_japanesefestival_jjmueller_8593.jpg">
    <div class="content">
      <span class="badge">Best Seller</span>
      <h3>Bonsai Serut</h3>
      <p class="price">Rp 120.000</p>
      <a class="btn" href="https://shopee.co.id/produk-kamu">Beli Sekarang</a>
    </div>
  </div>

</div>

<a href="https://wa.me/6285722040811" class="wa">
  Chat WhatsApp
</a>

</body>
</html>
