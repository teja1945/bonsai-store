<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonsai Teja</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body {
  background: #f5f7f6;
  color: #111;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}
.nav h2 {font-weight:600;}
.nav a {text-decoration:none;color:#444;}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px 40px;
  max-width:1200px;
  margin:auto;
}

.hero-text {
  max-width:500px;
}

.hero-text h1 {
  font-size:48px;
  line-height:1.2;
}

.hero-text p {
  margin:15px 0;
  color:#555;
}

.hero-text a {
  display:inline-block;
  background:#14532d;
  color:#fff;
  padding:14px 22px;
  border-radius:10px;
  text-decoration:none;
}

/* HERO IMAGE */
.hero-img {
  width:400px;
  height:400px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,0.15);
}
.hero-img img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SECTION */
.section {
  max-width:1200px;
  margin:auto;
  padding:60px 40px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body {
  padding:20px;
}

.card-body h3 {
  font-size:16px;
}

.price {
  margin:10px 0;
  font-weight:600;
}

.btn {
  display:block;
  text-align:center;
  background:#166534;
  color:white;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
}

/* TRUST */
.trust {
  display:flex;
  justify-content:space-between;
  gap:20px;
}

.trust div {
  background:white;
  padding:20px;
  border-radius:12px;
  flex:1;
  text-align:center;
}

/* WA FLOAT */
.wa {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:white;
  padding:16px;
  border-radius:50%;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="nav">
  <h2>Bonsai Teja</h2>
  <a href="#">Contact</a>
</div>

<div class="hero">
  <div class="hero-text">
    <h1>Bonsai Premium untuk Ruang Elegan</h1>
    <p>Dipilih langsung, siap rawat, cocok untuk dekorasi modern</p>
    <a href="#produk">Lihat Produk</a>
  </div>

  <div class="hero-img">
    <img src="images (1).jpeg">
  </div>
</div>

<div class="section" id="produk">
  <h2 style="margin-bottom:20px;">Produk Pilihan</h2>

  <div class="grid">

    <div class="card">
      <img src="images (1).jpeg">
      <div class="card-body">
        <h3>Bonsai Beringin</h3>
        <p class="price">Rp 75.000</p>
        <a href="#" class="btn">Beli</a>
      </div>
    </div>

    <div class="card">
      <img src="79b71-evt_japanesefestival_jjmueller_8593.jpg">
      <div class="card-body">
        <h3>Bonsai Serut</h3>
        <p class="price">Rp 120.000</p>
        <a href="#" class="btn">Beli</a>
      </div>
    </div>

  </div>
</div>

<div class="section">
  <div class="trust">
    <div>✔ Bonsai asli</div>
    <div>✔ Siap rawat</div>
    <div>✔ Support WA</div>
  </div>
</div>

<a href="https://wa.me/6285722040811" class="wa">WA</a>

</body>
</html>
